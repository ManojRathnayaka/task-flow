# =============================================================================
# Task Manager Application Configuration
# =============================================================================

# Load Environment Variables from local .env file (now handled by spring-dotenv)
# spring.config.import=optional:file:.env[.properties]

# Server
server.port=8080

# =============================================================================
# PostgreSQL Database (Neon Serverless)
# =============================================================================
spring.datasource.url=${DB_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hikari Connection Pool Settings for Serverless DB (Neon)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =============================================================================
# JWT Configuration
# =============================================================================
# Secret must be at least 256 bits (32 chars) for HS256
app.jwt.secret=${JWT_SECRET}
# Expiration in milliseconds: 86400000 = 24 hours
app.jwt.expiration=86400000

# =============================================================================
# SpringDoc / Swagger UI
# Access Swagger at: http://localhost:8080/swagger-ui.html
# =============================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# =============================================================================
# Logging
# =============================================================================
logging.level.com.taskmanager=DEBUG
logging.level.org.springframework.security=WARN
