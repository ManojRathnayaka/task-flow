# =============================================================================
# Task Manager Application Configuration
# =============================================================================

# Server
server.port=8080

# =============================================================================
# PostgreSQL Database (Neon Serverless)
# =============================================================================
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =============================================================================
# JWT Configuration
# =============================================================================
# Secret must be at least 256 bits (32 chars) for HS256
app.jwt.secret=ThisIsAVeryLongSuperSecretKeyForJWTTokenSigningWith256BitsMinimum!
# Expiration in milliseconds: 86400000 = 24 hours
app.jwt.expiration=86400000

# =============================================================================
# SpringDoc / Swagger UI
# Access Swagger at: http://localhost:8080/swagger-ui.html
# =============================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# =============================================================================
# Logging
# =============================================================================
logging.level.com.taskmanager=DEBUG
logging.level.org.springframework.security=WARN
